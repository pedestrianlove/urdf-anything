[workspace]
authors = ["pedestrianlove <jsli@linux.com>"]
channels = ["conda-forge"]
name = "urdf-anything"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
CUDA_HOME = "$CONDA_PREFIX"
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib"

[tasks]

[dependencies]
python = "3.12.*"
cuda = "12.6.*"
cuda-toolkit = "*"
gcc = "*"
pymeshlab = ">=2025.7.post1,<2026"

[pypi-options]
index-url = "https://pypi.org/simple"
extra-index-urls = ["https://download.pytorch.org/whl/cu126"]
find-links = [{url = "https://data.pyg.org/whl/torch-2.11.0+cu126.html"}]
no-build-isolation = ["diso"]

[pypi-dependencies]
torch = { version = ">=2.11.0" }
torchvision = { version = "*" }
torch-cluster = { version = "*" }
diso = { version = "*" }
diffusers = "==0.35.1"
transformers = "==4.57.2"
einops = ">=0.8.2, <0.9"
huggingface-hub = ">=0.36.2, <0.37"
opencv-python = ">=4.13.0.92, <5"
trimesh = "==4.7.4"
accelerate = ">=1.13.0, <2"
omegaconf = ">=2.3.0, <3"
scikit-image = ">=0.26.0, <0.27"
peft = ">=0.19.0, <0.20"
jaxtyping = ">=0.3.9, <0.4"
typeguard = ">=4.5.1, <5"
pyglet = "<2"
numpy = "*"
tqdm = ">=4.66.5, <5"
pyyaml = ">=6.0.3, <7"
safetensors = ">=0.7.0, <0.8"
wandb = ">=0.26.0, <0.27"
scipy = ">=1.17.1, <2"
pillow = ">=12.1.1, <13"
